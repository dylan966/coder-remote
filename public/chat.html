<!doctype html><html><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,interactive-widget=resizes-content">
<title>Chat</title>
<style>
* { box-sizing: border-box; }
:root {
  --bg:#f0eee6; --panel:#f6f4ec; --card:#faf9f5; --border:#e3dfd2;
  --text:#2b2a27; --muted:#77746c; --accent:#d97757; --accent-weak:#d977571a;
  --term-bg:#262624; --term-fg:#e8e6de;
  --serif: ui-serif, Georgia, "Iowan Old Style", Palatino, serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
}
html,body { height:100%; margin:0; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; }
#top { position:sticky; top:0; z-index:5; flex:0 0 auto; display:flex; align-items:center; gap:9px; padding:13px 16px; font-family:var(--serif); font-size:16px; font-weight:600; border-bottom:1px solid var(--border); background:color-mix(in srgb, var(--bg) 82%, transparent); backdrop-filter:saturate(1.4) blur(10px); -webkit-backdrop-filter:saturate(1.4) blur(10px); }
#top .dot { width:8px; height:8px; border-radius:50%; background:#b9b4a7; flex:0 0 auto; }
#top .dot.on { background:#6a9a5b; box-shadow:0 0 0 3px #6a9a5b22; }
#ws { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#sessbtn { margin-left:auto; max-width:56%; flex:0 0 auto; font-family:var(--sans); font-size:12px; font-weight:500; color:var(--text); background:var(--card); border:1px solid var(--border); border-radius:999px; padding:4px 12px; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#sessbtn:active { transform:scale(.96); }
/* session tree panel(project → session)*/
#sesspanel { display:none; position:fixed; top:52px; right:12px; left:12px; max-width:520px; margin-left:auto; z-index:20; background:var(--card); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow); padding:6px; max-height:70vh; overflow-y:auto; }
#sesspanel.show { display:block; }
.sp-new { padding:10px 12px; border-radius:8px; color:var(--accent); font-size:14px; font-weight:600; cursor:pointer; }
.sp-new:active { background:var(--accent-weak); }
.sp-proj { padding:9px 12px 4px; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; }
.sp-sess { display:flex; align-items:center; gap:6px; padding:8px 10px; border-radius:8px; }
.sp-sess.cur { background:var(--accent-weak); }
.sp-sess .sp-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:14px; cursor:pointer; }
.sp-sess .sp-acts { flex:0 0 auto; display:flex; gap:2px; }
.sp-sess .sp-acts button { width:30px; height:30px; border:0; background:none; color:var(--muted); font-size:14px; border-radius:7px; cursor:pointer; }
.sp-sess .sp-acts button:active { background:var(--border); }
#links { flex:0 0 auto; width:30px; height:30px; margin-left:6px; border-radius:8px; border:1px solid var(--border); background:var(--card); font-size:14px; line-height:1; cursor:pointer; }
#links:active { transform:scale(.92); }
#linksmenu { display:none; position:fixed; top:52px; right:12px; z-index:20; background:var(--card); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow); padding:5px; min-width:180px; max-width:80vw; }
#linksmenu.show { display:block; }
#linksmenu a { display:block; padding:10px 12px; border-radius:8px; text-decoration:none; color:var(--accent); font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#linksmenu a:active { background:var(--accent-weak); }
#linksmenu .empty { display:block; padding:10px 12px; color:var(--muted); font-size:13px; }
@media (max-width:768px){ #top { padding-left:54px; } } /* Make room for the parent's ☰ overlaid on top */
#log { flex:1; overflow-y:auto; padding:14px 12px 18px; display:flex; flex-direction:column; gap:10px; }

.row { display:flex; }
.row.user { justify-content:flex-end; }
.bub { max-width:82%; padding:9px 13px; border-radius:16px; font-size:15px; line-height:1.5; white-space:normal; overflow-wrap:anywhere; }
/* 让文字可长按选中/复制(iOS 默认可能禁用) */
.bub, .bub *, .cmdout pre, .step .detail pre { -webkit-user-select:text; user-select:text; -webkit-touch-callout:default; }
.user .bub { background:var(--accent); color:#fff; border-bottom-right-radius:5px; }
.asst .bub { background:var(--card); border:1px solid var(--border); border-bottom-left-radius:5px; }
.bub p { margin:.4em 0; } .bub p:first-child{margin-top:0;} .bub p:last-child{margin-bottom:0;}
.bub h1,.bub h2,.bub h3 { font-family:var(--serif); margin:.5em 0 .3em; font-size:1.05em; }
.bub ul { margin:.4em 0; padding-left:1.2em; }
.bub code { font-family:var(--mono); font-size:.88em; background:#2624240d; padding:1px 5px; border-radius:5px; }
.user .bub code { background:#ffffff2e; }
.bub pre { background:var(--term-bg); color:var(--term-fg); padding:10px 12px; border-radius:10px; overflow-x:auto; margin:.5em 0; }
.bub pre code { background:none; padding:0; color:inherit; font-size:12.5px; }
.bub hr { border:0; height:0; margin:.4em 0; }   /* No line drawn, just a bit of section spacing */
.bub table { border-collapse:collapse; margin:.5em 0; font-size:13px; display:block; overflow-x:auto; }
.bub th,.bub td { border:1px solid var(--border); padding:5px 9px; text-align:left; }
.bub th { background:#2624240a; }

/* Tool calls collapse into a small expandable bar */
.step { align-self:flex-start; max-width:88%; background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; cursor:pointer; }
.step-head { display:flex; align-items:center; gap:7px; padding:7px 11px; font-family:var(--mono); font-size:12.5px; color:var(--muted); }
.step-head b { color:#a44b2f; font-weight:600; flex:0 0 auto; }
.step-head .cmd { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.step-head .chev { flex:0 0 auto; transition:transform .15s; color:var(--muted); }
.step.err .step-head b { color:#b4472e; }
.step.open .chev { transform:rotate(90deg); }
.step .detail { display:none; border-top:1px solid var(--border); padding:8px 11px; }
.step.open .detail { display:block; }
.step .detail pre { font-family:var(--mono); font-size:12px; white-space:pre-wrap; overflow-wrap:anywhere; margin:0; background:var(--term-bg); color:var(--term-fg); padding:9px 11px; border-radius:8px; max-height:18em; overflow:auto; }
.step .detail .res { margin-top:6px; }
.step .detail .lbl { font-size:11px; color:var(--muted); margin:0 0 3px; }
/* diff */
.step .detail .diff { font-family:var(--mono); font-size:12px; border-radius:8px; overflow:auto; max-height:20em; background:var(--term-bg); padding:6px 0; }
.step .detail .diff .dl { white-space:pre-wrap; overflow-wrap:anywhere; padding:0 10px; color:var(--term-fg); }
.step .detail .diff .dl.add { background:#3a5a3033; color:#a6e3a1; }
.step .detail .diff .dl.del { background:#5a303033; color:#f2a6a0; }
.step .detail .diff .dl.ctx { color:#9a978c; }

/* Local slash commands + command output */
.slashcmd { align-self:flex-end; font-family:var(--mono); font-size:12.5px; color:#a44b2f; background:#d977571f; border-radius:8px; padding:3px 10px; }
.attrow { align-self:flex-end; display:flex; flex-wrap:wrap; gap:6px; justify-content:flex-end; max-width:82%; }
.attpill { font-size:12px; background:#d977571f; color:#a44b2f; border-radius:10px; padding:3px 10px; }
.attrow .thumb { max-width:150px; max-height:150px; border-radius:12px; border:1px solid var(--border); object-fit:cover; display:block; }
/* Inline images (Claude's screenshots, images from Read) */
.imgrow { align-self:flex-start; max-width:82%; }
.imgrow .chatimg { max-width:100%; border-radius:14px; border:1px solid var(--border); box-shadow:var(--shadow); display:block; }
.cmdout { align-self:flex-start; max-width:88%; }
.cmdout pre { margin:0; font-family:var(--mono); font-size:12px; color:var(--muted); background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 11px; white-space:pre-wrap; overflow-wrap:anywhere; max-height:12em; overflow:auto; }

/* Typing indicator */
.typing { align-self:flex-start; display:flex; gap:5px; padding:12px 15px; background:var(--card); border:1px solid var(--border); border-radius:16px; border-bottom-left-radius:5px; }
.typing span { width:7px; height:7px; border-radius:50%; background:var(--muted); animation:blink 1.3s infinite; }
.typing span:nth-child(2){ animation-delay:.18s; } .typing span:nth-child(3){ animation-delay:.36s; }
@keyframes blink { 0%,70%,100%{ opacity:.3; transform:translateY(0);} 35%{ opacity:1; transform:translateY(-3px);} }

#tobottom { position:fixed; right:14px; bottom:calc(84px + env(safe-area-inset-bottom)); z-index:6; width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:color-mix(in srgb, var(--panel) 90%, transparent); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); color:var(--text); font-size:17px; box-shadow:var(--shadow); cursor:pointer; display:none; }
#tobottom.show { display:block; }
#tobottom:active { transform:scale(.92); }
#composer { flex:0 0 auto; padding:8px 10px; padding-bottom:calc(8px + env(safe-area-inset-bottom)); background:var(--panel); border-top:1px solid var(--border); }
#bar { display:flex; gap:8px; align-items:flex-end; }
#atts { display:flex; flex-wrap:wrap; gap:6px; }
#atts:not(:empty) { margin-bottom:8px; }
#atts .att { display:flex; align-items:center; gap:6px; max-width:100%; font-size:12px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:4px 6px 4px 9px; color:var(--text); }
#atts .att.up { opacity:.6; }
#atts .att .nm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:160px; }
#atts .att .x { cursor:pointer; border:0; background:none; color:var(--muted); font-size:15px; line-height:1; padding:0 2px; }
#attach, #mic { flex:0 0 auto; width:40px; height:40px; border-radius:50%; background:var(--card); color:var(--muted); border:1px solid var(--border); font-size:20px; line-height:1; cursor:pointer; }
#attach { font-size:22px; }
#attach:active, #mic:active { transform:scale(.94); }
#mic.rec { background:var(--accent); color:#fff; border-color:var(--accent); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 #d9775766; } 50%{ box-shadow:0 0 0 6px #d9775700; } }
/* Stop button: appears while Claude is busy */
#stopbtn { position:fixed; left:50%; transform:translateX(-50%); bottom:calc(84px + env(safe-area-inset-bottom)); z-index:6; padding:7px 16px; border-radius:999px; border:1px solid var(--border); background:color-mix(in srgb, var(--panel) 92%, transparent); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); color:var(--text); font-size:13px; box-shadow:var(--shadow); cursor:pointer; display:none; }
#stopbtn.show { display:block; }
#stopbtn:active { transform:translateX(-50%) scale(.95); }
/* slash / @file autocomplete menu (floats above the input) */
#ac { display:none; flex-direction:column; max-height:44vh; overflow-y:auto; margin-bottom:8px; background:var(--card); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow); }
#ac.show { display:flex; }
#ac .item { padding:9px 13px; font-size:14px; cursor:pointer; border-bottom:1px solid var(--border); display:flex; gap:8px; align-items:baseline; min-width:0; }
#ac .item:last-child { border-bottom:0; }
#ac .item.sel, #ac .item:active { background:var(--accent-weak); }
#ac .item .k { font-family:var(--mono); color:#a44b2f; flex:0 0 auto; }
#ac .item .d { color:var(--muted); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#ac .item .p { font-family:var(--mono); font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
#msg { flex:1; resize:none; font:15px var(--sans); padding:10px 14px; border-radius:20px; background:var(--card); color:var(--text); border:1px solid var(--border); max-height:104px; outline:none; line-height:1.35; overflow-y:hidden; }
#msg:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-weak); }
#send { flex:0 0 auto; width:40px; height:40px; border-radius:50%; background:var(--accent); color:#fff; border:0; font-size:20px; font-weight:700; cursor:pointer; box-shadow:0 2px 6px #d9775740; }
#send:active { transform:scale(.94); }
</style>
</head><body>
<div id=top><span class=dot id=dot></span><span id=ws>—</span><button id=links type=button title="Quick links" aria-label="Quick links" hidden>🔗</button><button id=sessbtn type=button title="Sessions">会话 ▾</button></div>
<div id=linksmenu hidden></div>
<div id=sesspanel hidden></div>
<div id=log></div>
<div id=composer>
  <div id=ac hidden></div>
  <div id=atts></div>
  <div id=bar>
    <button id=attach type=button aria-label=Attach>＋</button>
    <button id=mic type=button aria-label=Voice hidden>🎤</button>
    <textarea id=msg rows=1 placeholder="Message Claude…"></textarea>
    <button id=send type=button aria-label=Send>↑</button>
  </div>
</div>
<button id=stopbtn type=button title="Stop" aria-label="Stop Claude">⏹ Stop</button>
<button id=tobottom type=button title="Scroll to bottom" aria-label="Scroll to bottom">⬇</button>
<input id=fileinput type=file accept="image/*,application/pdf,text/*,.csv,.log,.json" multiple hidden>
<script src="/chat.js"></script>
</body></html>
