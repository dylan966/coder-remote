<!doctype html><html><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,interactive-widget=resizes-content">
<title>Workspaces</title>
<link rel=manifest href="/manifest.json">
<meta name=theme-color content="#f0eee6">
<meta name=mobile-web-app-capable content=yes>
<meta name=apple-mobile-web-app-capable content=yes>
<meta name=apple-mobile-web-app-status-bar-style content=default>
<meta name=apple-mobile-web-app-title content=Switcher>
<link rel=apple-touch-icon href="/icon.svg">
<link rel=icon href="/icon.svg">
<link rel=stylesheet href="/vendor/xterm.css"><link rel=stylesheet href="/style.css">
</head><body>
<div id=app><aside id=side>
    <div id=brand>✻ Workspaces</div>
    <input id=search placeholder="Search workspaces (Ctrl/Cmd+K)"><ul id=list></ul>
  </aside>
<button id=menu aria-label=menu>☰</button>
<div id=scrim></div>
<main id=main>
  <header id=hdr><span id=hdr-dot class="dot dot-off"></span><span id=hdr-name>No workspace selected</span><span id=hdr-sesswrap><button id=hdr-sess style="display:none"></button><div id=hdr-sessmenu></div></span><span id=hdr-apps></span></header>
  <div id=termwrap></div>
  <iframe id=chatframe title="chat"></iframe>
  <div id=mbar>
    <div id=mkeys></div>
    <div id=minput><textarea id=mtext rows=1 placeholder="Message claude…"></textarea><button id=msend aria-label=Send>↑</button></div>
  </div>
</main></div>
<script src="/vendor/xterm.js"></script><script src="/vendor/addon-fit.js"></script>
<script src="/app.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body></html>
